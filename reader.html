ings-row input[type=text],.settings-row select{padding:8px 10px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary)}.style-controls{display:flex;gap:8px}.style-btn{width:40px;height:36px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;font-weight:700}.style-btn.active{background:var(--accent-tts);color:#fff}.skip-controls{display:flex;align-items:center;gap:12px}.skip-controls button{width:32px;height:28px;border-radius:8px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary)}.mode-btn{padding:8px 12px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer}.mode-btn.active{background:linear-gradient(135deg,var(--accent-tts),#2b7be6);color:#fff}.settings-footer{padding:12px 16px;border-top:1px solid var(--border-color)}.export-modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:12000}.export-content{background:var(--bg-primary);border:1px solid var(--glass-border);padding:20px;border-radius:12px;width:360px;box-shadow:var(--shadow-lg)}.export-content h3{margin-top:0;color:var(--text-primary)}.export-content .settings-row{margin-bottom:10px}.modal-close{position:absolute;right:12px;top:12px;background:0 0;border:none;font-size:18px;color:var(--text-muted);cursor:pointer}</style></head><body><div class="reader-modal-overlay" id="readerModalOverlay"><div class="reader-modal"><div class="reader-modal-header"><span class="reader-modal-title" id="readerTitle">Loading...</span><div class="reader-modal-actions"><button id="themeToggle" title="Toggle Light/Dark" aria-label="Toggle Theme"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4. dary)">Skip</label><div class="skip-controls"><button id="ctlSkipMinus">-</button> <span id="ctlSkipValue">0</span> <button id="ctlSkipPlus">+</button></div><div style="display:flex;align-items:center;gap:6px;background:var(--bg-tertiary);border-radius:10px;border:1.5px solid var(--border-color);padding:4px 10px 4px 8px;margin-left:8px"><span style="font-size:11px;color:var(--text-secondary);font-weight:600">Highlight</span> <input id="ctlHighlightColor" type="color" value="#fff176" title="Highlight Color" style="width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-color);box-shadow:none;padding:0;cursor:pointer;appearance:none;-webkit-appearance:none"></div></div></div><div class="settings-row" style="flex-direction:row;gap:18px;margin-top:8px;align-items:center"><div style="display:flex;align-items:center;gap:12px;flex:1 1 0%;min-width:0"><div style="display:flex;align-items:center;gap:6px;background:var(--bg-tertiary);border-radius:10px;border:1.5px solid var(--border-color);padding:4px 10px 4px 8px"><button id="ctlInk" class="mode-btn active" style="padding:4px 8px;font-size:12px;border:none;background:0 0;color:var(--text-primary);font-weight:700">INK</button> <input id="ctlInkColor" type="color" value="#d32f2f" title="Ink Color" style="width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-color);box-shadow:none;padding:0;cursor:pointer;appearance:none;-webkit-appearance:none"></div><div style="display:flex;align-items:center;gap:6px;background:var(--bg-tertiary);border-radius:10px;border:1.5px solid var(--border-color);padding:4px 10px 4px 8px"><button id="ctlFade" class="mode-btn" style="padding:4px 8px;font-size:12px;border:none;background:0 0;color:var(--text-primary);font-weight:700">FADE</button> <input id="ctlFadeColor" type="color" value="#f44336" title="Fade Color" style="width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-color);box-shadow:none;padding:0;cursor:pointer;appearance:none;-webkit-appearance:none"></div><div style="display:flex;align-items:center;gap:6px;background:var(--bg-tertiary);border-radius:10px;border:1.5px solid var(--border-color);padding:4px 10px 4px 8px"><label style="font-size:11px;color:var(--text-secondary);font-weight:600;margin:0;display:flex;align-items:center;gap:4px"><input id="ctlBackground" type="checkbox" style="margin:0 4px 0 0">BG</label> <input id="ctlBackgroundColor" type="color" value="#fffbe6" title="Background Color" style="width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-color);box-shadow:none;padding:0;cursor:pointer;appearance:none;-webkit-appearance:none"></div></div></div><div class="settings-row" style="flex-direction:row;gap:18px;align-items:flex-end;margin-top:18px"><div style="flex:1"><label style="font-size:12px;color:var(--text-secondary)">Font</label> <select id="ctlFont" style="width:100%"><option value="default">Default</option><optgroup label="Optimized"><option value="opendyslexic">OpenDyslexic</option><option value="lexend">Lexend</option><option value="atkinson">Atkinson Hyperlegible</option></optgroup><optgroup label="Sans Serif"><option value="arial">Arial</option><option value="helvetica">Helvetica</option><option value="verdana">Verdana</option><option value="tahoma">Tahoma</option><option value="trebuchet">Trebuchet MS</option><option value="sans">System Sans</option></optgroup><optgroup label="Serif"><option value="times">Times New Roman</option><option value="georgia">Georgia</option><option value="garamond">Garamond</option><option value="serif">System Serif</option></optgroup><optgroup label="Creative / Other"><option value="comic">Comic Sans MS</option><option value="comic_neue">Comic Neue</option><option value="courier">Courier New</option><option value="monospace">Monospace</option></optgroup><optgroup label="System Fonts" id="systemFontsGroup"><option value="Segoe UI">Segoe UI (Windows Default)</option><option value="Calibri">Calibri</option><option value="C
